##############################################
# Picom - Fast + Light Blur (i3)
##############################################

###############
# Backend
###############

backend = "glx";
vsync = true;
use-damage = true;

###############
# Shadows
###############

shadow = true;
shadow-radius = 8;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.2;

shadow-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'"
];

###############
# Fading (leggero)
###############

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;

###############
# Opacity
###############

inactive-opacity = 0.95;
active-opacity = 1.0;

###############
# Blur (OTTIMIZZATO)
###############

blur-background = true;
blur-background-frame = true;
blur-method = "dual_kawase";

blur-strength = 4;   # 👈 basso = veloce

blur-background-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'dmenu'",
  "window_type = 'dock'"
];

###############
# Rounded corners (leggero)
###############

corner-radius = 0;

###############
# Window rules
###############

wintypes:
{
  dock = { shadow = false; };
  dnd = { shadow = false; };
};

###############
# Performance
###############

unredir-if-possible = true;

###############
# Logging
###############

log-level = "warn";

